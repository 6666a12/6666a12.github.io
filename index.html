<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello</title>
    <link rel="stylesheet" type="text/css" href="css/m.css">
    <link rel="stylesheet" type="text/css" href="css/audio.css">
    <link rel="stylesheet" type="text/css" href="css/auth.css">
</head>
<body>
    <img class="bg" src="pic/bg.jpg" alt="">
    <!-- 顶端目录 -->
    <div>
        <ul class="topmenu">
            <li><img src="pic/stream-pig.gif" width="40" height="40" alt=""></li>
            <li><a href="#index" class="highlight">主页</a></li>
            <li><a href="src/home.html">网站简介</a></li>
            <li><a href="src/articles.html">艺术鉴赏</a></li>
            <li><a href="src/minecraft.html">爱好制作</a></li>
            <li><a href="#blog" class="undo" title="没做好">随如🖊</a></li>
            <li><a href="#donation" class="undo" title="没做好">投喂</a></li>
            <li><div class="breathe" id="clock"></div></li>
            <!-- 认证状态 -->
            <li class="auth-item" id="auth-item">
                <span class="loading-text">...</span>
            </li>
        </ul>
    </div>

    <!-- 这个我喜欢 -->
    <div id="suki">
        <img alt="" title="我本人" src="pic/lemon.jpg" width="200" height="300" id="lm"><br>
        <p>
            <b>欢迎来到我的网站 点击上方导航栏了解网站</b><br>
            <a href="src/update.html">点击查看更新日志</a>
        </p>
    </div>
    
    <!-- 音频区块  -->
    <div id="audiom" title="music">
        <div id="playarea">
            <audio id="audio_player"></audio>
            <div id="trackinfo">请选择歌曲</div>
            <div id="audiobt">
                <button type="button" onclick="pgdown()">👈</button>
                <button type="button" onclick="pause()" id="pausebt">▶</button>
                <button type="button" onclick="pgup()">👉</button>
            </div>
        </div>
        
        <div id="progress">
            <input placeholder="0" type="range" id="pgslider" min="0" max="100" value="0" oninput="seekaudio(this.value)">
            <span id="pgtxt">0: 00 / 0: 00</span>
        </div>
    </div>

    <!-- 底部小图标 -->
    <div id="bottomm">
        <ul class="bottom-bar">
            <li><a href="https://space.bilibili.com/687368009">关注主播喵</a></li>
            <li><img src="pic/trakov-logo.webp" alt="" width="60" height="25"></li>
            <li><img src="pic/Dynamix_logo.webp" alt="" width="25" height="25"></li>
        </ul>
    </div>
    <!-- 神秘小按钮 -->
    <a class="bt" href="src/admin.html">login</a>
</body>
<!-- Supabase SDK -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<!-- 全局认证模块 -->
<script src="components/auth.js"></script>
<script src="components/sc.js"></script>
<script src="components/audio-player.js"></script>
<script>
    // 初始化音频播放器
    AudioPlayer.init({
        audioId: "audio_player",
        sliderId: "pgslider",
        timeId: "pgtxt",
        pauseBtnId: "pausebt",
        trackInfoId: "trackinfo"
    });
    
    // 更新顶部菜单认证状态
    function updateAuthStatus(user) {
        const container = document.getElementById('auth-item');
        if (!container) return;
        
        if (user) {
            container.classList.add('logged-in');
            container.innerHTML = `
                <a href="src/admin.html#/user" title="${user.email}">
                    👤 <span class="auth-email">${user.email}</span>
                </a>
                <button onclick="handleLogout()" title="退出">×</button>
            `;
        } else {
            container.classList.remove('logged-in');
            container.innerHTML = `
                <a href="src/admin.html#/login">登录</a>
            `;
        }
    }
    
    async function handleLogout() {
        try {
            await Auth.logout();
            updateAuthStatus(null);
        } catch (e) {
            console.error('退出失败:', e);
        }
    }
    
    // 订阅认证状态变化
    Auth.subscribe((user) => {
        updateAuthStatus(user);
    });
</script>
</html>
