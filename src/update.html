<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新日志</title>
    <link rel="stylesheet" type="text/css" href="../css/main.css">
    <link rel="stylesheet" type="text/css" href="../css/audio.css">
    <link rel="stylesheet" type="text/css" href="../css/auth.css">
</head>
<body>
    <img class="bg" src="../pic/bg.jpg" alt="">
    <!-- 顶端目录 -->
    <div>
        <ul class="topmenu">
            <li><img src="../pic/stream-pig.gif" width="40" height="40" alt=""></li>
            <li><a href="../index.html">主页</a></li>
            <li><a href="home.html">网站简介</a></li>
            <li><a href="articles.html">艺术鉴赏</a></li>
            <li><a href="minecraft.html">爱好制作</a></li>
            <li><a href="#blog" class="undo" title="没做好">随如🖊</a></li>
            <li><a href="#donation" class="undo" title="没做好">投喂</a></li>
            <li><div class="breathe" id="clock"></div></li>
            <!-- 认证状态 -->
            <li class="auth-item" id="auth-item">
                <span class="loading-text">...</span>
            </li>
        </ul>
    </div>
    <!-- 主要内容 -->
    <div id="update">
        <b>2026.4.17</b> --- 重构 Charts 系统：对接 GitHub API<br>
        <b>2026.4.6</b> --- 添加了登录状态同步，现在登录状态改变会更新界面<br>
        <b>2026.4.4</b> --- 添加完整的用户认证系统，支持全局登录状态同步<br>
        <b>2026.2.10</b> --- 添加了音乐播放功能<br>
    </div>
    <!-- 音频区块 -->
    <div id="audiom" title="music">
        <div id="playarea">
            <audio id="audio_player"></audio>
            <div id="trackinfo">请选择歌曲</div>
            <div id="audiobt">
                <button type="button" onclick="pgdown()">👈</button>
                <button type="button" onclick="pause()" id="pausebt">▶</button>
                <button type="button" onclick="pgup()">👉</button>
            </div>
        </div>
        <div id="progress">
            <input placeholder="0" type="range" id="pgslider" min="0" max="100" value="0" oninput="seekaudio(this.value)">
            <span id="pgtxt">0: 00 / 0: 00</span>
        </div>
    </div>

    <!-- 底部小图标 -->
    <div id="bottomm">
        <ul class="bottom-bar">
            <li><a href="https://space.bilibili.com/687368009">关注主播喵</a></li>
            <li><img src="../pic/trakov-logo.webp" alt="" width="60" height="25"></li>
            <li><img title="dead game" src="../pic/Dynamix_logo.webp" alt="" width="25" height="25"></li>
        </ul>
    </div>
</body>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../components/auth.js"></script>
<script src="../components/clock.js"></script>
<script src="../components/audio-player.js"></script>
<script>
    // 初始化音频播放器
    AudioPlayer.init({
        audioId: "audio_player",
        sliderId: "pgslider",
        timeId: "pgtxt",
        pauseBtnId: "pausebt",
        trackInfoId: "trackinfo",
        basePath: "../"
    });

    function updateAuthStatus(user) {
        const container = document.getElementById('auth-item');
        if (!container) return;
        if (user) {
            container.classList.add('logged-in');
            container.innerHTML = `<a href="admin.html#/user" title="${user.email}">👤</a><button onclick="handleLogout()" title="退出">×</button>`;
        } else {
            container.classList.remove('logged-in');
            container.innerHTML = `<a href="admin.html#/login" onclick="localStorage.setItem('login_return_url', window.location.href)">登录</a>`;
        }
    }
    async function handleLogout() {
        try { await Auth.logout(); updateAuthStatus(null); } catch (e) { console.error(e); }
    }
    Auth.subscribe(updateAuthStatus);
</script>
</html>
