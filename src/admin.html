<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户认证</title>
    <link rel="stylesheet" type="text/css" href="../css/m.css">
    <link rel="stylesheet" type="text/css" href="../css/log-in.css">
    <link rel="stylesheet" type="text/css" href="../css/admin.css">
</head>
<body>
    <div class="ed" id="edit">
        <img class="bg" id="wife0" alt="" src="../pic/yz.jpg">
    </div>  
    <div id="topm">
        <ul class="topmenu">
            <li><img src="../pic/stream-pig.gif" width="40" height="40" alt=""></li>
            <li><a href="../index.html">主页</a></li>
            <li><a href="../src/home.html">网站简介</a></li>
            <li><div id="clock" class="breathe"></div></li>
        </ul>
    </div>

    <!-- 页面内容容器 -->
    <div id="app">
        <div style="text-align: center; padding: 60px;">
            <div class="loading-spinner" style="border-color: #667eea; border-top-color: transparent;"></div>
            <p>加载中...</p>
        </div>
    </div>

    <!-- 登录模板 -->
    <template id="page-login">
        <div id="login">
            <form id="loginf" onsubmit="return handleLogin(event)">
                <h1>🔐 用户登录</h1>
                <div id="login-message"></div>
                <p>邮箱</p>
                <input placeholder="your@email.com" type="email" id="login-email" name="email" required autocomplete="email">
                <p>密码</p>
                <input placeholder="请输入密码" type="password" id="login-password" name="password" required minlength="6" autocomplete="current-password"><br>
                <button type="submit" id="login-submit">
                    <span class="btn-text">登录</span>
                </button>
                <button type="button" onclick="router.push('/register')">创建新账户</button>              
            </form>
        </div>
    </template>

    <!-- 注册模板 -->
    <template id="page-register">
        <div id="register">
            <form id="regf" onsubmit="return handleRegister(event)">
                <h1>📝 用户注册</h1>
                <div id="register-message"></div>
                <p>邮箱</p>
                <input placeholder="your@email.com" type="email" id="reg-email" name="email" required autocomplete="email">
                <p>密码</p>
                <input placeholder="至少6个字符" type="password" id="reg-password" name="password" required minlength="6" autocomplete="new-password">
                <p>确认密码</p>
                <input placeholder="再次输入密码" type="password" id="reg-confirm" name="confirm" required minlength="6" autocomplete="new-password"><br>
                <button type="submit" id="reg-submit">
                    <span class="btn-text">注册</span>
                </button>
                <button type="button" onclick="router.push('/login')">已有账户？去登录</button>              
            </form>
        </div>
    </template>
    
    <!-- 用户中心模板 -->
    <template id="page-user">
        <div id="page-user">
            <h2>👤 用户中心</h2>
            <div id="user-message"></div>
            <div class="user-info">
                <p><label>邮箱:</label> <span id="user-email">-</span></p>
                <p><label>用户ID:</label> <span id="user-id">-</span></p>
                <p><label>本次登录时间:</label> <span id="user-login-time">-</span></p>
                <p><label>已登录时长:</label> <span id="user-session-duration">-</span></p>
                <p><label>剩余有效时间:</label> <span id="user-remaining-time" class="remaining-time">-</span></p>
                <p><label>上次登录:</label> <span id="user-last-signin">-</span></p>
                <p><label>账户创建:</label> <span id="user-created">-</span></p>
            </div>
            <button class="logout-btn" onclick="handleLogout()" id="logout-btn">
                <span class="btn-text">退出登录</span>
            </button>
        </div>
    </template>

    <!-- 404 模板 -->
    <template id="page-404">
        <div id="page-404">
            <h1>😕 404</h1>
            <p>页面未找到</p>
            <button onclick="router.push('/login')">返回登录</button>
        </div>
    </template>
    
</body>
<!-- Supabase SDK -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<!-- 全局认证模块 -->
<script src="../components/auth.js"></script>
<!-- 时钟组件 -->
<script src="../components/sc.js"></script>
<!-- 路由组件 -->
<script src="../Components/Hash.js"></script>

<script>
    // ============================================
    // Supabase 配置
    // ============================================
    const SUPABASE_URL = 'https://diblhuossmbwbwylmnye.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_hwUuS2OHWH_OPkAExyQUYA_uqTdNLW6';
    
    // 初始化 Supabase 客户端
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // ============================================
    // 路由配置
    // ============================================
    const routes = {
        '/login': () => {
            if (Auth.isLoggedIn()) {
                router.push('/user');
                return;
            }
            RenderPage('page-login');
        },
        '/register': () => {
            if (Auth.isLoggedIn()) {
                router.push('/user');
                return;
            }
            RenderPage('page-register');
        },
        '/user': () => {
            if (!Auth.isLoggedIn()) {
                router.push('/login');
                return;
            }
            RenderPage('page-user', setupUserPage);
        },
        '*': () => RenderPage('page-404')
    };

    const router = new HashRouter(routes);

    // ============================================
    // 页面初始化
    // ============================================
    async function main() {
        // 覆盖 auth.js 中的 supabase 配置
        window.Auth._supabase = supabaseClient;
        
        // 等待认证初始化
        await Auth.init();
        
        // 订阅认证状态变化（更新顶部菜单）
        Auth.subscribe(updateTopMenuAuth);
        
        // 设置初始路由
        if (!location.hash) {
            router.push('/login');
        } else {
            router.render();
        }
    }
    
    // 更新顶部菜单认证状态
    function updateTopMenuAuth(user) {
        const container = document.getElementById('auth-item');
        if (!container) return;
        if (user) {
            container.classList.add('logged-in');
            container.innerHTML = `<a href="#/user" title="${user.email}">👤 <span class="auth-email">${user.email}</span></a><button onclick="handleTopMenuLogout()" title="退出">×</button>`;
        } else {
            container.classList.remove('logged-in');
            container.innerHTML = `<a href="#/login">登录</a>`;
        }
    }
    
    async function handleTopMenuLogout() {
        try {
            await Auth.logout();
            router.push('/login');
        } catch (e) {
            console.error('退出失败:', e);
        }
    }

    // ============================================
    // 认证处理函数
    // ============================================
    async function handleLogin(event) {
        event.preventDefault();
        
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const submitBtn = document.getElementById('login-submit');
        
        setButtonLoading(submitBtn, true, '登录中...');
        
        try {
            // 使用 Auth 模块的登录方法，会自动记录登录时间
            await Auth.login(email, password);
            
            showMessage('login-message', '✅ 登录成功！', false);
            
            setTimeout(() => {
                router.push('/user');
            }, 500);
            
        } catch (error) {
            console.error('登录失败:', error);
            showMessage('login-message', '❌ ' + getErrorMessage(error), true);
            setButtonLoading(submitBtn, false, '登录');
        }
        
        return false;
    }

    async function handleRegister(event) {
        event.preventDefault();
        
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        const confirm = document.getElementById('reg-confirm').value;
        const submitBtn = document.getElementById('reg-submit');
        
        // 验证密码
        if (password !== confirm) {
            showMessage('register-message', '❌ 两次输入的密码不一致！', true);
            return false;
        }
        
        if (password.length < 6) {
            showMessage('register-message', '❌ 密码至少需要6个字符！', true);
            return false;
        }
        
        setButtonLoading(submitBtn, true, '注册中...');
        
        try {
            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password
            });
            
            if (error) throw error;
            
            showMessage('register-message', '✅ 注册成功！请检查邮箱验证账户。', false);
            event.target.reset();
            
            setTimeout(() => {
                router.push('/login');
            }, 2000);
            
        } catch (error) {
            console.error('注册失败:', error);
            showMessage('register-message', '❌ ' + getErrorMessage(error), true);
            setButtonLoading(submitBtn, false, '注册');
        }
        
        return false;
    }

    async function handleLogout() {
        const btn = document.getElementById('logout-btn');
        setButtonLoading(btn, true, '退出中...');
        
        try {
            await Auth.logout();
            router.push('/login');
        } catch (error) {
            console.error('退出失败:', error);
            showMessage('user-message', '❌ 退出失败: ' + error.message, true);
            setButtonLoading(btn, false, '退出登录');
        }
    }

    // ============================================
    // 用户中心设置
    // ============================================
    let sessionTimer = null;
    
    function setupUserPage() {
        const user = Auth.getUser();
        if (!user) return;
        
        document.getElementById('user-email').textContent = user.email || '-';
        document.getElementById('user-id').textContent = user.id || '-';
        
        // 本次登录时间
        const loginTime = Auth.getLoginTime();
        document.getElementById('user-login-time').textContent = loginTime 
            ? new Date(loginTime).toLocaleString('zh-CN')
            : '-';
        
        // 上次登录（来自 Supabase）
        document.getElementById('user-last-signin').textContent = user.last_sign_in_at 
            ? new Date(user.last_sign_in_at).toLocaleString('zh-CN')
            : '-';
        
        document.getElementById('user-created').textContent = user.created_at 
            ? new Date(user.created_at).toLocaleString('zh-CN')
            : '-';
        
        // 更新时长显示
        updateSessionDuration();
        
        // 每秒更新时长
        if (sessionTimer) clearInterval(sessionTimer);
        sessionTimer = setInterval(updateSessionDuration, 1000);
    }
    
    function updateSessionDuration() {
        // 已登录时长
        const durationEl = document.getElementById('user-session-duration');
        if (durationEl) {
            durationEl.textContent = Auth.getSessionDuration();
        }
        
        // 剩余时间
        const remainingEl = document.getElementById('user-remaining-time');
        if (remainingEl) {
            const remaining = Auth.getRemainingTime();
            const formatted = Auth.getRemainingTimeFormatted();
            remainingEl.textContent = formatted;
            
            // 根据剩余时间改变颜色
            remainingEl.classList.remove('warning', 'danger');
            if (remaining < 30 * 60 * 1000) { // 少于30分钟
                remainingEl.classList.add('danger');
            } else if (remaining < 2 * 60 * 60 * 1000) { // 少于2小时
                remainingEl.classList.add('warning');
            }
        }
    }
    
    // 页面卸载时清理定时器
    window.addEventListener('beforeunload', () => {
        if (sessionTimer) clearInterval(sessionTimer);
    });

    // ============================================
    // 工具函数
    // ============================================
    function showMessage(elementId, text, isError) {
        const box = document.getElementById(elementId);
        if (!box) return;
        
        box.textContent = text;
        box.className = 'message ' + (isError ? 'error' : 'success');
        box.style.display = 'block';
    }

    function setButtonLoading(btn, loading, text) {
        if (loading) {
            btn.disabled = true;
            btn.innerHTML = `<span class="loading-spinner"></span>${text}`;
        } else {
            btn.disabled = false;
            btn.innerHTML = `<span class="btn-text">${text}</span>`;
        }
    }

    function getErrorMessage(error) {
        const messages = {
            'Invalid login credentials': '邮箱或密码错误',
            'Email not confirmed': '邮箱尚未验证，请检查邮箱',
            'User already registered': '该邮箱已注册',
            'Password should be at least 6 characters': '密码至少需要6个字符',
            'Unable to validate email address: invalid format': '邮箱格式不正确',
            'AuthApiError': '认证失败，请稍后重试',
            'Network error': '网络错误，请检查网络连接',
            'Email rate limit exceeded': '请求过于频繁，请稍后再试'
        };
        return messages[error.message] || error.message || '发生错误，请重试';
    }

    // 启动应用
    main();
</script>
</html>
