<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户认证</title>
    <link rel="stylesheet" type="text/css" href="../css/main.css">
    <link rel="stylesheet" type="text/css" href="../css/log-in.css">
    <link rel="stylesheet" type="text/css" href="../css/admin.css">
</head>
<body>
    <!-- 背景 -->
    <div class="ed" id="edit">
        <img class="bg" id="wife0" alt="" src="../pic/yz.jpg">
    </div>
    
    <!-- 顶部导航 -->
    <div id="topm">
        <ul class="topmenu">
            <li><img src="../pic/stream-pig.gif" width="40" height="40" alt=""></li>
            <li><a href="../index.html">主页</a></li>
            <li><a href="../src/home.html">网站简介</a></li>
            <li><div id="clock" class="breathe"></div></li>
        </ul>
    </div>

    <!-- 页面内容容器 -->
    <div id="app">
        <div style="text-align: center; padding: 60px;">
            <div class="loading-spinner" style="border-color: #667eea; border-top-color: transparent;"></div>
            <p>加载中...</p>
        </div>
    </div>

    <!-- 登录模板 -->
    <template id="page-login">
        <div id="login">
            <form id="loginf" onsubmit="return AdminAuth.handleLogin(event)">
                <h1>🔐 用户登录</h1>
                <div id="login-message"></div>
                <p>邮箱</p>
                <input placeholder="your@email.com" type="email" id="login-email" required autocomplete="email">
                <p>密码</p>
                <input placeholder="请输入密码" type="password" id="login-password" required minlength="6" autocomplete="current-password"><br>
                <button type="submit" id="login-submit">
                    <span class="btn-text">登录</span>
                </button>
                <button type="button" onclick="router.push('/register')">创建新账户</button>
            </form>
        </div>
    </template>

    <!-- 注册模板 -->
    <template id="page-register">
        <div id="register">
            <form id="regf" onsubmit="return AdminAuth.handleRegister(event)">
                <h1>📝 用户注册</h1>
                <div id="register-message"></div>
                <p>邮箱</p>
                <input placeholder="your@email.com" type="email" id="reg-email" required autocomplete="email">
                <p>密码</p>
                <input placeholder="至少6个字符" type="password" id="reg-password" required minlength="6" autocomplete="new-password">
                <p>确认密码</p>
                <input placeholder="再次输入密码" type="password" id="reg-confirm" required minlength="6" autocomplete="new-password"><br>
                <button type="submit" id="reg-submit">
                    <span class="btn-text">注册</span>
                </button>
                <button type="button" onclick="router.push('/login')">已有账户？去登录</button>
            </form>
        </div>
    </template>

    <!-- 用户中心模板 -->
    <template id="page-user">
        <div id="page-user">
            <h2>👤 用户中心</h2>
            <div id="user-message"></div>
            <div class="user-info">
                <p><label>邮箱:</label> <span id="user-email">-</span></p>
                <p><label>用户ID:</label> <span id="user-id">-</span></p>
                <p><label>本次登录时间:</label> <span id="user-login-time">-</span></p>
                <p><label>已登录时长:</label> <span id="user-session-duration">-</span></p>
                <p><label>剩余有效时间:</label> <span id="user-remaining-time" class="remaining-time">-</span></p>
                <p><label>上次登录:</label> <span id="user-last-signin">-</span></p>
                <p><label>账户创建:</label> <span id="user-created">-</span></p>
            </div>
            <button class="logout-btn" onclick="AdminAuth.handleLogout()" id="logout-btn">
                <span class="btn-text">退出登录</span>
            </button>
        </div>
    </template>

    <!-- 404 模板 -->
    <template id="page-404">
        <div id="page-404">
            <h1>😕 404</h1>
            <p>页面未找到</p>
            <button onclick="router.push('/login')">返回登录</button>
        </div>
    </template>
</body>

<!-- 脚本加载 -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../components/auth.js"></script>
<script src="../components/clock.js"></script>
<script src="../components/Hash.js"></script>
<script src="../components/admin-auth.js"></script>

<script>
    // 路由配置
    const routes = {
        '/login': () => {
            if (AdminAuth.routeLogin()) {
                RenderPage('page-login');
            }
        },
        '/register': () => {
            if (AdminAuth.routeRegister()) {
                RenderPage('page-register');
            }
        },
        '/user': () => {
            if (AdminAuth.routeUser()) {
                RenderPage('page-user', AdminAuth.setupUserPage);
            }
        },
        '*': () => RenderPage('page-404')
    };

    // 初始化
    async function main() {
        // 先等待认证初始化
        await Auth.init();
        
        // 创建路由（此时 Auth 已准备好）
        const router = new HashRouter(routes);
        
        // 初始化 admin 认证组件
        AdminAuth.init(router);
        
        // 手动渲染初始路由
        if (!location.hash) {
            router.push('/login');
        } else {
            router.render();
        }
    }

    main();
</script>
</html>
